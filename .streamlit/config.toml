serverAddress = "0.0.0.0"

[theme]
primaryColor = "#E30613"
backgroundColor = "#f5f5f5"
secondaryBackgroundColor = "#ffffff"
textColor = "#1f2937"
font = "sans serif"

[client]
showErrorDetails = false
toolbarMode = "minimal"
